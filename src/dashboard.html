<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microsoft To Do MCP Server</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e1e1e1;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    h1 { font-size: 1.6rem; font-weight: 600; color: #fff; margin-bottom: 4px; }

    .subtitle { font-size: 0.9rem; color: #777; margin-bottom: 32px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .badge-green { background: #0d2e1a; color: #4ade80; border: 1px solid #166534; }
    .badge-red   { background: #2e0d0d; color: #f87171; border: 1px solid #7f1d1d; }

    .status-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

    .status-detail { font-size: 0.85rem; color: #777; }
    .status-detail span { color: #aaa; }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
      margin-top: 16px;
    }

    .btn:hover { opacity: 0.85; }
    .btn-blue    { background: #2563eb; color: #fff; }
    .btn-outline { background: transparent; color: #aaa; border: 1px solid #333; }

    .code-block {
      position: relative;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px 48px 16px 16px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.8rem;
      color: #a3e635;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 10px;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #222;
      border: 1px solid #333;
      color: #aaa;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: #2a2a2a; color: #fff; }

    .section-label { font-size: 0.82rem; color: #666; margin-top: 20px; margin-bottom: 4px; }

    .apikey-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 10px;
    }

    .apikey-box code {
      flex: 1;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.82rem;
      color: #facc15;
      word-break: break-all;
    }

    .apikey-box button {
      background: #222;
      border: 1px solid #333;
      color: #aaa;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
    }

    .footer { margin-top: 40px; font-size: 0.75rem; color: #444; text-align: center; }
    .footer a { color: #555; text-decoration: none; }
    .footer a:hover { color: #777; }

    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }

    .tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #666;
      transition: all 0.15s;
    }

    .tab.active { background: #2563eb22; border-color: #2563eb66; color: #93c5fd; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .info-box {
      font-size: 0.85rem;
      color: #777;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Microsoft To Do MCP Server</h1>
    <p class="subtitle">Self-hosted MCP server for Microsoft To Do</p>

    <!-- Status Card -->
    <div class="card">
      <div class="card-title">Connection Status</div>
      <div class="status-row">
        {{STATUS_BADGE}}
        {{USER_EMAIL_ROW}}
        {{TOKEN_EXPIRY_ROW}}
      </div>
      {{AUTH_BUTTON}}
    </div>

    {{SETUP_SECTION}}

    <div class="footer">
      <p>
        <a href="https://github.com/akkilesh-a/microsoft-todo-mcp-server-self-hosted" target="_blank">microsoft-todo-mcp-server-self-hosted</a>
        &bull; MCP endpoint: <code>{{MCP_URL}}</code>
      </p>
    </div>
  </div>

  <script>
    function copyText(id, btn) {
      const el = document.getElementById(id)
      const text = el.innerText.replace(/Copy$/, '').trim()
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent
        btn.textContent = 'Copied!'
        setTimeout(() => btn.textContent = orig, 1500)
      })
    }

    function switchTab(e, tabId) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
      e.target.classList.add('active')
      document.getElementById(tabId).classList.add('active')
    }
  </script>
</body>
</html>
